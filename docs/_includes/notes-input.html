{% assign _notes_slug = page.permalink | default: page.url | remove: '/' %}
{% assign _notes_slug_num = _notes_slug | plus: 0 %}

{% if _notes_slug != "" and _notes_slug == _notes_slug_num %}
  <div
    id="pageNotesWidget"
    style="position: fixed; right: 1rem; bottom: 1rem; width: min(420px, calc(100vw - 2rem)); z-index: 9998;"
  >
    <div style="display: flex; justify-content: flex-end; margin-bottom: 0.35rem;">
      <button
        type="button"
        id="pageNotesToggle"
        style="border: 1px solid #bbb; background: #fff; border-radius: 999px; padding: 0.35rem 0.7rem; cursor: pointer; font-weight: 700;"
      >
        Anotações
      </button>
    </div>

    <div
      id="pageNotesPanel"
      style="display: none; padding: 0.9rem 1.1rem; border: 1px solid #bbb; border-radius: 12px; background: #fff; box-shadow: 0 12px 28px rgba(0,0,0,0.18);"
    >
    <p style="margin-top: 0; margin-bottom: 0.5rem;"><strong>Anotações</strong></p>
    <textarea
      id="pageNotesInput"
      rows="6"
      style="width: 100%; box-sizing: border-box; resize: vertical; padding: 0.6rem 0.75rem; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; font-size: 0.95rem;"
      placeholder="Escreva aqui suas anotações para esta página (salvas localmente neste navegador)."
    ></textarea>
    <p style="margin-bottom: 0; margin-top: 0.5rem; color: #666; font-size: 0.85rem;">
      Salva automaticamente no navegador (localStorage).
    </p>
    </div>
  </div>

  <script>
    (function () {
      try {
        var key = "fala_pb:notes:" + "{{ page.permalink | default: page.url }}";
        var toggle = document.getElementById("pageNotesToggle");
        var panel = document.getElementById("pageNotesPanel");
        var el = document.getElementById("pageNotesInput");
        if (!toggle || !panel || !el) return;

        var saved = localStorage.getItem(key);
        if (saved != null) el.value = saved;

        var openKey = key + ":open";
        var isOpen = localStorage.getItem(openKey) === "1";
        panel.style.display = isOpen ? "block" : "none";

        toggle.addEventListener("click", function () {
          isOpen = !isOpen;
          panel.style.display = isOpen ? "block" : "none";
          localStorage.setItem(openKey, isOpen ? "1" : "0");
        });

        var t;
        el.addEventListener("input", function () {
          if (t) clearTimeout(t);
          t = setTimeout(function () {
            localStorage.setItem(key, el.value);
          }, 250);
        });
      } catch (e) {
        // ignore
      }
    })();
  </script>
{% endif %}
